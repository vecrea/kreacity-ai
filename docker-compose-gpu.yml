version: '3.8'

services:
  # Service pour les embeddings locaux (version GPU NVIDIA)
  sentence-transformers:
    # Image compatible avec CUDA
    image: xenova/transformers:latest
    ports:
      - "8080:80"
    environment:
      - MODEL_ID=Xenova/all-MiniLM-L6-v2
      - USE_CUDA=1
    volumes:
      - hf-cache:/app/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: 1
              driver: nvidia
    networks:
      - kreacity-ai
    # Expose une API REST compatible avec les embeddings
    command: python -m uvicorn app:app --host 0.0.0.0 --port 80

volumes:
  hf-cache:

networks:
  kreacity-ai:
    external: true
