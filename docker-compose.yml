version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      # Variables pour permettre à n8n de communiquer avec les autres services
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - FLOWISE_HOST=flowise
      - FLOWISE_PORT=3000
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - kreacity-ai

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant-init:/qdrant-init
    restart: unless-stopped
    networks:
      - kreacity-ai
    command: >
      sh -c "
        qdrant --config-path /qdrant/config/config.yaml &
        sleep 10 &&
        curl -X PUT 'http://localhost:6333/collections/vectors' -H 'Content-Type: application/json' -d '{
          \"vectors\": {
            \"size\": 1024,
            \"distance\": \"Cosine\"
          }
        }' &&
        tail -f /dev/null
      "

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - kreacity-ai

  flowise:
    image: flowiseai/flowise:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - SECRETKEY_PATH=/root/.flowise
      # Variables pour permettre à Flowise de communiquer avec les autres services
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - flowise_data:/root/.flowise
    restart: unless-stopped
    networks:
      - kreacity-ai

volumes:
  n8n_data:
  qdrant_data:
  postgres_data:
  flowise_data:

networks:
  kreacity-ai:
    driver: bridge
